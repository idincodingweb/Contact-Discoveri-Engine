name: Contact Discovery

on:
  workflow_dispatch:
    inputs:
      keyword:
        description: 'Keyword / niche (leave empty if using domain)'
        required: false
        default: 'Dental Marketing Agency'
      domain:
        description: 'Single domain (overrides keyword if set)'
        required: false
        default: ''
      country:
        description: 'Country filter'
        required: false
        default: 'US'
      max_results:
        description: 'Max SERP results'
        required: false
        default: '20'
      render_js:
        description: 'Use Playwright JS rendering (true/false)'
        required: false
        default: 'false'

  schedule:
    # Run nightly at 02:00 UTC — adjust or remove as needed
    - cron: '0 2 * * *'

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright (optional)
        if: ${{ github.event.inputs.render_js == 'true' }}
        run: |
          python -m playwright install --with-deps chromium

      - name: Run discovery (keyword)
        if: ${{ github.event.inputs.domain == '' }}
        run: |
          python main.py \
            --keyword "${{ github.event.inputs.keyword || 'Dental Marketing Agency' }}" \
            --country "${{ github.event.inputs.country || 'US' }}" \
            --max-results ${{ github.event.inputs.max_results || 20 }} \
            ${{ github.event.inputs.render_js == 'true' && '--render-js' || '' }}

      - name: Run discovery (domain)
        if: ${{ github.event.inputs.domain != '' }}
        run: |
          python main.py \
            --domain "${{ github.event.inputs.domain }}" \
            --country "${{ github.event.inputs.country || 'US' }}" \
            ${{ github.event.inputs.render_js == 'true' && '--render-js' || '' }}

      - name: Run tests
        run: |
          pip install pytest
          pytest -q || true

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: contact-discovery-results
          path: |
            outputs/results.csv
            outputs/results.json
            outputs/results.xlsx
            outputs/contacts.db
          retention-days: 30
